services:
  mongo:
    image: mongo:7
    container_name: ai-analyst-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kppdf_ai

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: ai-analyst-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongo_data:
  qdrant_data:
